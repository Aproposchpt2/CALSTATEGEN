name: NAT-CORP metric regression tests
on:
  pull_request:
    branches: [main]
    paths:
      - 'netlify/functions/_shared/natcorp-*.mjs'
      - 'tests/natcorp-core.test.js'
      - '.github/workflows/natcorp-metric-tests.yml'
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm test
