[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# AOIS R&D production routes
[[redirects]]
  from = "/services.html"
  to = "/business-dna-builder-preview.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/services"
  to = "/business-dna-builder-preview.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/intake.html"
  to = "/business-dna-builder-preview.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/dashboard.html"
  to = "/aois-dashboard-preview.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/dashboard"
  to = "/aois-dashboard-preview.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/analyze-fit.html"
  to = "/analyze-fit-v2.html?v=2"
  status = 302
  force = true

[[redirects]]
  from = "/stage"
  to = "/stage.html"
  status = 200

[[redirects]]
  from = "/pdas-dashboard"
  to = "/pdas-dashboard.html"
  status = 200

[[edge_functions]]
  path = "/"
  function = "calstategen-nav-login-cta"

[[edge_functions]]
  path = "/index.html"
  function = "calstategen-nav-login-cta"

[[edge_functions]]
  path = "/business-dna-builder-preview.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/aois-dashboard-preview.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/analyze-fit-v2.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/login.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/welcome.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/stage.html"
  function = "natcorp-conversion"
