[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; upgrade-insecure-requests"

# Friendly production URLs are internal rewrites. The visible URL remains stable,
# which preserves page identity, browser history, and runtime path detection.
[[redirects]]
  from = "/services.html"
  to = "/business-dna-builder-preview.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/business-dna-builder-preview.html"
  status = 200

[[redirects]]
  from = "/intake.html"
  to = "/business-dna-builder-preview.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/business-dna-builder-preview.html"
  status = 200

[[redirects]]
  from = "/dashboard.html"
  to = "/aois-dashboard-preview.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/aois-dashboard-preview.html"
  status = 200

[[redirects]]
  from = "/analyze-fit.html"
  to = "/analyze-fit-v2.html"
  status = 200

[[redirects]]
  from = "/analyze-fit"
  to = "/analyze-fit-v2.html"
  status = 200

[[redirects]]
  from = "/stage"
  to = "/stage.html"
  status = 200

[[redirects]]
  from = "/pdas-dashboard"
  to = "/pdas-dashboard.html"
  status = 200

[[edge_functions]]
