*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--screen);color:#fff;font-family:Inter,Arial,sans-serif;line-height:1.5}button,a{font:inherit}.topbar{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 22px;background:rgba(6,23,44,.96);border-bottom:1px solid rgba(255,255,255,.13);backdrop-filter:blur(12px)}.top-title{font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:8px;padding:9px 14px;text-decoration:none;font-size:.75rem;font-weight:800;cursor:pointer}.back{background:#63d6ff;color:#06172c}.print{background:#fff;color:var(--navy)}.shell{max-width:1120px;margin:auto;padding:28px 18px 80px}.loading{text-align:center;padding:90px 20px}.spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,.14);border-top-color:#77e4b2;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}.loading h2{margin:0;font-size:1rem}.loading p{margin:8px 0 0;color:#a3b3c8;font-size:.82rem}.error{max-width:760px;margin:30px auto;padding:24px;border:1px solid rgba(255,116,126,.38);background:rgba(255,116,126,.08);border-radius:14px;color:#ffe1e4}.report{display:grid;gap:28px}.report-page{position:relative;width:min(8.5in,100%);min-height:10.75in;margin:auto;background:var(--paper);color:var(--ink);padding:.54in .58in .68in;border-radius:16px;box-shadow:var(--shadow);overflow:hidden}.page-head{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:start;padding-bottom:10px;margin-bottom:20px;border-bottom:2px solid var(--gold)}.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:44px;height:44px;border:2px solid var(--gold);display:grid;place-items:center;background:var(--navy);color:#fff;font:700 1rem/1 "Cormorant Garamond",serif}.brand-copy{font-size:.62rem;line-height:1.35;letter-spacing:.13em;text-transform:uppercase;color:var(--navy);font-weight:800}.brand-copy span{display:block;color:var(--gold);margin-top:3px}.head-meta{text-align:right;font-size:.56rem;line-height:1.55;letter-spacing:.07em;text-transform:uppercase;color:#697586}.page-foot{position:absolute;left:.58in;right:.58in;bottom:.23in;display:flex;justify-content:space-between;gap:15px;padding-top:8px;border-top:1px solid var(--line);font-size:.54rem;text-transform:uppercase;letter-spacing:.08em;color:#6d7885}.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(145deg,#fff 0%,#f7f8fa 66%,#f3ead5 150%)}.cover:before{content:"";position:absolute;inset:0 0 auto;height:18px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy))}.cover-logo{display:flex;align-items:center;gap:16px;margin-bottom:28px}.cover-logo .brand-mark{width:78px;height:78px;font-size:1.8rem}.cover-wordmark{text-align:left}.cover-wordmark strong{display:block;font:700 2rem/1 "Cormorant Garamond",serif;color:var(--navy);letter-spacing:.06em}.cover-wordmark span{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:800}.kicker{font-size:.68rem;text-transform:uppercase;letter-spacing:.22em;color:var(--gold);font-weight:800}.cover h1{font:700 clamp(2.35rem,6vw,3.8rem)/.98 "Cormorant Garamond",serif;color:var(--navy);max-width:720px;margin:13px auto 10px}.subtitle{font-size:.78rem;text-transform:uppercase;letter-spacing:.16em;color:#687586;font-weight:800}.rule{width:92px;height:3px;background:var(--gold);margin:23px auto}.client{font:700 1.75rem/1.1 "Cormorant Garamond",serif;color:var(--navy)}.opp{max-width:700px;margin-top:7px;font-size:1rem;line-height:1.4;font-weight:800;color:#354252}.agency{font-size:.76rem;color:#697586;margin-top:5px}.cover-decision{display:grid;grid-template-columns:145px minmax(300px,1fr);gap:30px;align-items:center;width:min(700px,100%);margin-top:30px}.score{width:145px;height:145px;border-radius:50%;display:grid;place-items:center;background:#fff;border:7px solid var(--gold);box-shadow:0 10px 28px rgba(9,40,74,.13)}.score strong{display:block;font-size:3.4rem;line-height:.85;color:var(--navy)}.score span{display:block;margin-top:8px;font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:#6c7784;font-weight:800}.decision-box{text-align:left;border:1px solid var(--gold2);background:var(--goldsoft);padding:18px 22px}.label{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:#77602a;font-weight:800}.decision-value{font:700 1.55rem/1.08 "Cormorant Garamond",serif;color:var(--navy);text-transform:uppercase;margin-top:5px}.decision-note{font-size:.67rem;color:#6d7884;margin-top:8px}.page-no{font-size:.7rem;color:var(--gold);font-weight:800;letter-spacing:.12em}.page-title{font:700 2rem/1.02 "Cormorant Garamond",serif;color:var(--navy);margin:2px 0 0}.page-deck{max-width:680px;margin:7px 0 18px;font-size:.78rem;line-height:1.55;color:#677484}.gold-rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:17px}.summary{border:1px solid var(--line);border-top:4px solid var(--gold);padding:15px 17px;margin-bottom:14px}.eyebrow{font-size:.61rem;text-transform:uppercase;letter-spacing:.11em;color:var(--gold);font-weight:800;margin-bottom:6px}.copy{font-size:.84rem;line-height:1.6;color:#3d4956}.copy p{margin:0 0 9px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:13px 0 15px}.metric{min-height:78px;padding:10px 11px;border:1px solid var(--line);border-top:3px solid var(--blue)}.metric.gold{border-top-color:var(--gold)}.metric.green{border-top-color:var(--green)}.metric.amber{border-top-color:var(--amber)}.metric.red{border-top-color:var(--red)}.metric-label{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;color:#697586;font-weight:800}.metric-value{font-size:.95rem;line-height:1.18;color:var(--navy);font-weight:800;margin-top:6px}.metric-note{font-size:.57rem;line-height:1.2;color:#707b88;margin-top:4px;text-transform:uppercase;font-weight:700}.table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:.7rem;line-height:1.4}.table th{background:var(--navy);color:#fff;text-align:left;padding:8px;font-size:.57rem;text-transform:uppercase;letter-spacing:.06em}.table td{padding:8px;border:1px solid var(--line);vertical-align:top}.table tr:nth-child(even) td{background:#f7f8fa}.field{width:20%;color:#687586;font-weight:800}.callout{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-left:5px solid var(--gold);background:var(--goldsoft);font-size:.74rem;line-height:1.48}.callout strong{color:var(--navy)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.panel{border:1px solid var(--line);padding:13px 14px;background:#fff}.panel h3{margin:0 0 8px;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy)}.panel p,.panel li{font-size:.74rem;line-height:1.5;color:#475462}.panel ul{margin:0;padding-left:17px}.panel li+li{margin-top:4px}.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.status{border:1px solid var(--line);padding:11px 12px;min-height:112px}.status-head{display:flex;align-items:center;gap:8px;font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}.status.aligned .dot{background:var(--green)}.status.verify .dot{background:var(--amber)}.status.gap .dot{background:var(--red)}.status-value{display:inline-block;margin:7px 0 5px;padding:2px 6px;background:#eef3f7;color:var(--blue);font-size:.6rem;font-weight:800;text-transform:uppercase}.status.aligned .status-value{background:#eaf5ef;color:var(--green)}.status.verify .status-value{background:#fff4d9;color:#8b6511}.status.gap .status-value{background:#fae8ea;color:var(--red)}.status-detail{font-size:.7rem;line-height:1.43;color:#4e5b69}.status-note{font-size:.64rem;line-height:1.4;color:#707b87;font-style:italic;margin-top:5px}.rating{font-weight:800;text-transform:uppercase}.strong{color:var(--green)}.partial{color:var(--amber)}.gaptext{color:var(--red)}.unknown{color:var(--blue)}.quadrant{display:grid;grid-template-columns:1fr 1fr;gap:11px}.quad{border:1px solid var(--line);padding:13px 14px;min-height:160px}.quad h3{font-size:.69rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin:0 0 8px}.quad ul{margin:0;padding-left:17px}.quad li{font-size:.72rem;line-height:1.46;color:#465462}.quad li+li{margin-top:4px}.risk-low{color:var(--green)}.risk-medium{color:var(--amber)}.risk-high{color:var(--red)}.risk-information{color:var(--blue)}.observations{display:grid;grid-template-columns:1fr 1fr;gap:11px}.observation{border-left:4px solid var(--gold);background:#f7f8fa;padding:12px 13px;min-height:124px}.observation h3{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin:0 0 6px}.observation p{font-size:.72rem;line-height:1.46;color:#485563;margin:0}.decision-banner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:15px 17px;border:1px solid var(--gold2);background:var(--goldsoft);margin-bottom:13px}.decision-banner strong{font:700 1.55rem/1 "Cormorant Garamond",serif;color:var(--navy);text-transform:uppercase}.decision-banner span{font-size:.68rem;color:#677484}.condition{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.73rem;color:#465462}.condition:before{content:'□';color:var(--gold);font-weight:800}.action-col{border:1px solid var(--line);padding:13px}.action-col h3{margin:0 0 8px;color:var(--navy);font-size:.67rem;text-transform:uppercase;letter-spacing:.07em}.action-col ol{margin:0;padding-left:18px}.action-col li{font-size:.72rem;line-height:1.46;color:#465462}.action-col li+li{margin-top:5px}.signature-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:25px}.signature{padding-top:28px;border-bottom:1px solid #7d8792;font-size:.58rem;text-transform:uppercase;color:#6b7682}.sources{margin:8px 0 0;padding-left:18px}.sources li{font-size:.68rem;line-height:1.45;color:#52606e}.sources li+li{margin-top:4px}.limitations{font-size:.68rem;line-height:1.48;color:#52606e}.trust{text-align:center;margin-top:14px;font-size:.72rem;color:#a3b3c8;font-style:italic}
@media(max-width:760px){.topbar{align-items:flex-start}.report-page{min-height:auto;padding:30px 23px 58px}.page-foot{left:23px;right:23px}.page-head{grid-template-columns:1fr}.head-meta{text-align:left}.metrics,.three{grid-template-columns:1fr 1fr}.two,.status-grid,.quadrant,.observations,.cover-decision,.signature-grid{grid-template-columns:1fr}.decision-box{text-align:center}.header-meta{text-align:left}}
@page{size:Letter portrait;margin:0}@media print{html,body{background:#fff!important;color:var(--ink)!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.topbar,.loading,.trust{display:none!important}.shell{max-width:none;margin:0;padding:0}.report{display:block}.report-page{width:8.5in!important;height:11in!important;min-height:11in!important;margin:0!important;padding:.47in .5in .58in!important;border:0!important;border-radius:0!important;box-shadow:none!important;page-break-after:always!important;break-after:page!important;overflow:hidden!important}.report-page:last-child{page-break-after:auto!important}.page-foot{left:.5in!important;right:.5in!important;bottom:.18in!important}.copy{font-size:9.7pt!important}.table{font-size:8.4pt!important}.panel p,.panel li,.quad li,.observation p,.action-col li,.condition{font-size:8.4pt!important}.metric,.status,.panel,.quad,.observation,.action-col,.table tr,.callout{break-inside:avoid!important}}

<body>
<header class="topbar"><div class="top-title" id="topTitle">Executive Opportunity Assessment</div><div class="actions"><a class="btn back" href="/dashboard.html">← Back to Bid Board</a><button class="btn print" id="printBtn" style="display:none" onclick="window.print()">Export Premium PDF ↓</button></div></header>
<main class="shell"><section class="loading" id="loading"><div class="spinner"></div><h2>Preparing the executive opportunity dossier…</h2><p>Evaluating alignment, eligibility, evidence, competition, risk, and resource readiness.</p></section><div id="report"></div><div class="trust" id="trust" hidden>Decision support only. Validate all requirements against the official solicitation and current registrations.</div></main>
<script>
'use strict';
const payload=JSON.parse(localStorage.getItem('ca_analyze_payload')||'null');
if(payload)localStorage.removeItem('ca_analyze_payload');
const report=document.getElementById('report'),loading=document.getElementById('loading'),printBtn=document.getElementById('printBtn'),trust=document.getElementById('trust');
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const arr=v=>Array.isArray(v)?v.filter(Boolean):v==null||v===''?[]:[String(v)];
const clip=(v,n=260)=>{v=String(v==null?'':v);return v.length>n?v.slice(0,n-1).trim()+'…':v};
const text=(v,f='Not provided')=>esc(clip(v||f));
const list=(v,max=6)=>arr(v).slice(0,max).map(x=>'<li>'+text(typeof x==='object'?(x.item||x.name||JSON.stringify(x)):x,220)+'</li>').join('')||'<li>Not enough source information was available. Validate the official solicitation.</li>';
const date=v=>{if(!v)return'Not stated';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})};
const days=v=>{if(!v)return null;const d=new Date(v);if(Number.isNaN(d.getTime()))return null;return Math.ceil((d-Date.now())/86400000)};
const tone=v=>String(v||'').toLowerCase().replace(/[^a-z]+/g,'-');
const rating=v=>{v=String(v||'UNKNOWN').toUpperCase();return v==='STRONG'?'strong':v==='PARTIAL'?'partial':v==='GAP'?'gaptext':'unknown'};
const riskTone=v=>'risk-'+String(v||'INFORMATION').toLowerCase();
const footer=()=>'<div class="page-foot"><span>APROPOS GROUP LLC · CONFIDENTIAL</span><span>Executive Decision Support</span></div>';
const brand=(page,total,id,prepared)=>'<div class="page-head"><div class="brand"><div class="brand-mark">AG</div><div class="brand-copy">Executive Opportunity Assessment<span>State & Local Procurement Intelligence</span></div></div><div class="head-meta">Assessment '+esc(id)+'<br>Prepared '+esc(prepared)+'<br>Page '+page+' of '+total+'</div></div>';
const start=(page,title,deck,total,id,prepared)=>'<section class="report-page">'+brand(page,total,id,prepared)+'<div class="page-no">'+String(page).padStart(2,'0')+'</div><h1 class="page-title">'+esc(title)+'</h1><p class="page-deck">'+esc(deck)+'</p><div class="gold-rule"></div>';
const metric=(label,value,note,cls='')=>'<div class="metric '+cls+'"><div class="metric-label">'+esc(label)+'</div><div class="metric-value">'+text(value, 'Unknown')+'</div><div class="metric-note">'+esc(note)+'</div></div>';
const statusCard=item=>{const s=String(item.status||'VERIFY').toUpperCase();return'<div class="status '+tone(s)+'"><div class="status-head"><span class="dot"></span>'+text(item.factor,'Eligibility factor')+'</div><div class="status-value">'+esc(s.replace('_',' '))+'</div><div class="status-detail">'+text(item.detail,'Validation required.',300)+'</div><div class="status-note">Executive note: '+text(item.executive_note,'Confirm against the official solicitation.',220)+'</div></div>'};
function fail(message){loading.style.display='none';report.innerHTML='<div class="error"><strong>Assessment unavailable</strong><p>'+esc(message)+'</p></div>'}
function build(data){
  const a=data.analysis||{},bid=payload.bid||{},p=payload.profile||{};
  const recommendation=String(a.recommendation||'CONDITIONAL').toUpperCase();
  const score=Math.max(0,Math.min(100,Number(a.score)||0));
  const prepared=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const id=('NCX-'+String(bid.solicitation_no||bid.solicitation_number||bid.id||Date.now()).replace(/[^a-z0-9]/gi,'').slice(-14)).toUpperCase();
  const client=p.business_name||p.legal_name||p.company_name||'NAT-CORP Visitor';
  const title=bid.title||'Untitled Opportunity';
  const agency=bid.agency||bid.issuing_organization||'Public Agency';
  const solicitation=bid.solicitation_no||bid.solicitation_number||bid.id||'Not stated';
  const deadline=bid.close_date||bid.response_deadline||bid.deadline||'';
  const dleft=days(deadline);
  const aoie=bid._aoie?.aoie||bid.aoie||{};
  const eligibility=arr(a.eligibility).slice(0,8);
  const capability=arr(a.capability_evidence).slice(0,7);
  const risks=arr(a.risks).slice(0,8);
  const observations=arr(a.executive_observations).slice(0,6);
  const comp=a.competitive_position||{};
  const actions=a.action_plan||{};
  const total=11;
  document.getElementById('topTitle').textContent=title;
  let html='<div class="report">';
  html+='<section class="report-page cover"><div class="cover-logo"><div class="brand-mark">AG</div><div class="cover-wordmark"><strong>APROPOS</strong><span>GROUP LLC</span></div></div><div class="kicker">Government Opportunity Intelligence</div><h1>Executive Opportunity Assessment</h1><div class="subtitle">Prepared for</div><div class="rule"></div><div class="client">'+esc(client)+'</div><div class="opp">'+esc(title)+'</div><div class="agency">'+esc(agency)+' · Solicitation '+esc(solicitation)+'</div><div class="cover-decision"><div class="score"><div><strong>'+score+'</strong><span>Pursuit Score</span></div></div><div class="decision-box"><div class="label">Executive Recommendation</div><div class="decision-value">'+esc(recommendation.replace('-',' '))+'</div><div class="decision-note">Assessment standard: '+esc(data.report_standard||'APROPOS-EOA-11P-STATE-LOCAL-v1')+' · Prepared '+esc(prepared)+'</div></div></div>'+footer()+'</section>';

  html+=start(2,'Executive Decision Summary','The recommendation, decision-critical facts, and management posture in one view.',total,id,prepared);
  html+='<div class="summary"><div class="eyebrow">Executive Summary</div><div class="copy"><p>'+text(a.executive_summary,'The opportunity requires additional validation before a pursuit decision is authorized.',900)+'</p><p>'+text(a.rationale,'The recommendation reflects available capability, eligibility, risk, and schedule evidence.',700)+'</p></div></div>';
  html+='<div class="metrics">'+metric('Pursuit Score',score+' / 100',recommendation,'gold')+metric('AOIE Match',aoie.fit_score!=null?aoie.fit_score+' / 100':'Not available','Preliminary relevance','green')+metric('Deadline',date(deadline),dleft==null?'Verify date':dleft+' days remaining',dleft!=null&&dleft<10?'red':'amber')+metric('Source Quality',bid.description?'Description available':'Limited metadata','Review attachments','')+metric('Eligibility',eligibility.some(x=>x.status==='GAP')?'Material gap':eligibility.some(x=>x.status==='VERIFY')?'Validation required':'Appears aligned','Not final','amber')+metric('Competition','Not fully known','Validate market','')+metric('Evidence Readiness',capability.some(x=>x.rating==='GAP')?'Gaps present':'Developing','Requirement ledger','amber')+metric('Assessment Provider',data.provider||'AI service','Evidence-aware','')+'</div>';
  html+='<table class="table"><thead><tr><th colspan="4">Opportunity Overview</th></tr></thead><tbody><tr><td class="field">Agency</td><td>'+esc(agency)+'</td><td class="field">Solicitation</td><td>'+esc(solicitation)+'</td></tr><tr><td class="field">Type</td><td>'+text(bid.bid_type||bid.procurement_type||bid.notice_type,'Solicitation')+'</td><td class="field">Status</td><td>'+text(bid.status,'Open / verify')+'</td></tr><tr><td class="field">Deadline</td><td>'+esc(date(deadline))+'</td><td class="field">State</td><td>'+text(bid.state_code||bid.state||p.state,'Not stated')+'</td></tr><tr><td class="field">UNSPSC</td><td>'+text(arr(bid.unspsc_codes).join(', '),'Not stated')+'</td><td class="field">Commodity Codes</td><td>'+text(arr(bid.commodity_codes||bid.category_ids).join(', '),'Not stated')+'</td></tr></tbody></table>';
  html+='<div class="callout"><strong>Executive posture</strong><span>'+(recommendation==='GO'?'Advance to controlled pursuit validation. Do not commit full proposal resources until every mandatory requirement is confirmed.':recommendation==='NO-GO'?'Do not authorize pursuit unless the identified material gaps can be resolved with verified evidence.':'Maintain a conditional posture. Resolve the listed decision conditions before authorizing full pursuit resources.')+'</span></div>'+footer()+'</section>';

  html+=start(3,'Strategic Alignment','How the opportunity aligns with the business profile, selected services, and AOIE evidence.',total,id,prepared);
  html+='<div class="two"><div class="panel"><h3>Business Capability Profile</h3><ul>'+list([].concat(arr(p.services),arr(p.core_competencies),arr(p.keywords)).slice(0,8),8)+'</ul></div><div class="panel"><h3>Opportunity Scope Indicators</h3><ul>'+list([bid.title,bid.description].concat(arr(a.required_work)).filter(Boolean),7)+'</ul></div></div>';
  html+='<div class="panel" style="margin-top:12px"><h3>Strategic Alignment Findings</h3><ul>'+list(a.strategic_alignment,6)+'</ul></div>';
  html+='<table class="table"><thead><tr><th>Evidence Domain</th><th>Available Evidence</th><th>Executive Interpretation</th></tr></thead><tbody><tr><td>AOIE relevance</td><td>'+text((aoie.explanation?.why_matched||[]).join('; '),'No AOIE explanation was supplied.',500)+'</td><td>Preliminary matching evidence only; confirm the actual statement of work.</td></tr><tr><td>Business classifications</td><td>'+text([].concat(arr(p.naics_codes),arr(p.unspsc_codes),arr(p.commodity_codes)).join(', '),'Not provided')+'</td><td>Classification supports discovery but does not prove performance capability.</td></tr><tr><td>Geographic coverage</td><td>'+text(arr(p.service_states||p.states||p.state).join(', '),'Not provided')+'</td><td>Confirm place-of-performance and local-preference requirements.</td></tr><tr><td>Past performance</td><td>'+text(p.past_performance,'Not provided')+'</td><td>Comparable scope, value, complexity, outcomes, and references should be documented.</td></tr></tbody></table>'+footer()+'</section>';

  html+=start(4,'Eligibility Review','Mandatory participation, registration, licensing, certification, and timing gates.',total,id,prepared);
  html+='<div class="status-grid">'+(eligibility.length?eligibility.map(statusCard).join(''):[{factor:'Vendor registration',status:'VERIFY',detail:'Confirm registration on the issuing agency or procurement platform.',executive_note:'Registration may be required before submission.'},{factor:'Licenses and certifications',status:'VERIFY',detail:'The available record does not establish every mandatory credential.',executive_note:'Validate jurisdiction, status, and expiration dates.'},{factor:'Deadline and amendments',status:'VERIFY',detail:'Confirm the current response date, question date, meetings, and amendments.',executive_note:'The official portal controls.'},{factor:'Insurance and bonding',status:'VERIFY',detail:'Requirements were not fully available in the matching record.',executive_note:'Confirm before pricing and authorization.'}].map(statusCard).join(''))+'</div>';
  html+='<div class="callout" style="margin-top:13px"><strong>Eligibility principle</strong><span>Unknown information is not treated as a failure. However, no unknown mandatory requirement may be treated as satisfied until verified against the official solicitation and current business records.</span></div>'+footer()+'</section>';

  html+=start(5,'Capability Evidence Ledger','Requirement-by-requirement evidence, gaps, and closure actions.',total,id,prepared);
  html+='<table class="table"><thead><tr><th>Requirement</th><th>Business Evidence</th><th>Rating</th><th>Gap / Unknown</th><th>Required Action</th></tr></thead><tbody>'+(capability.length?capability.map(x=>'<tr><td>'+text(x.requirement,'Requirement not specified',180)+'</td><td>'+text(x.evidence,'No evidence supplied',190)+'</td><td class="rating '+rating(x.rating)+'">'+text(x.rating,'UNKNOWN')+'</td><td>'+text(x.gap,'Verify requirement',180)+'</td><td>'+text(x.action,'Assign an owner and closure date.',180)+'</td></tr>').join(''):'<tr><td>Complete solicitation scope</td><td>No requirement-level evidence was supplied.</td><td class="rating unknown">UNKNOWN</td><td>Full scope and evidence mapping are unavailable.</td><td>Obtain the complete solicitation and build an evidence matrix.</td></tr>')+'</tbody></table>';
  html+='<div class="two"><div class="panel"><h3>Required Work</h3><ul>'+list(a.required_work,7)+'</ul></div><div class="panel"><h3>Staffing & Delivery</h3><ul>'+list(a.staffing_delivery,7)+'</ul></div></div>'+footer()+'</section>';

  html+=start(6,'Competitive Position','Current advantages, limitations, and market pressures affecting win credibility.',total,id,prepared);
  html+='<div class="quadrant"><div class="quad"><h3>Strengths</h3><ul>'+list(comp.strengths,5)+'</ul></div><div class="quad"><h3>Weaknesses</h3><ul>'+list(comp.weaknesses,5)+'</ul></div><div class="quad"><h3>Advantages</h3><ul>'+list(comp.advantages,5)+'</ul></div><div class="quad"><h3>Threats</h3><ul>'+list(comp.threats,5)+'</ul></div></div>';
  html+='<div class="callout"><strong>Competitive discipline</strong><span>Relevant capability does not equal competitive advantage. Confirm incumbent position, evaluation factors, price sensitivity, local preference, delivery credibility, and differentiating evidence before authorizing pursuit.</span></div>'+footer()+'</section>';

  html+=start(7,'Risk Command Center','Material pursuit and performance risks with management mitigations.',total,id,prepared);
  html+='<table class="table"><thead><tr><th>Risk Domain</th><th>Level</th><th>Finding</th><th>Mitigation</th></tr></thead><tbody>'+(risks.length?risks.map(x=>'<tr><td>'+text(x.domain,'Risk')+'</td><td class="rating '+riskTone(x.level)+'">'+text(x.level,'INFORMATION')+'</td><td>'+text(x.finding,'Validation required',220)+'</td><td>'+text(x.mitigation,'Assign an owner and closure date.',220)+'</td></tr>').join(''):'<tr><td>Solicitation completeness</td><td class="rating risk-information">INFORMATION</td><td>Risk detail was not available.</td><td>Complete the official solicitation review.</td></tr>')+'</tbody></table>';
  html+='<div class="two"><div class="panel"><h3>Documents Needed</h3><ul>'+list(a.documents_needed,7)+'</ul></div><div class="panel"><h3>Pricing Considerations</h3><ul>'+list(a.pricing_considerations,6)+'</ul></div></div>'+footer()+'</section>';

  html+=start(8,'Executive Observations','Management-level interpretations that should shape the pursuit decision.',total,id,prepared);
  html+='<div class="observations">'+(observations.length?observations.map(x=>'<div class="observation"><h3>'+text(x.title,'Observation')+'</h3><p>'+text(x.observation,'Additional validation is required.',360)+'</p></div>').join(''):'<div class="observation"><h3>Source limitation</h3><p>The available opportunity record did not contain enough detail for multiple executive observations. Obtain the official solicitation package.</p></div>')+'</div>';
  html+='<div class="panel" style="margin-top:13px"><h3>Questions for the Buyer / Contracting Office</h3><ul>'+list(a.questions_for_buyer,7)+'</ul></div>'+footer()+'</section>';

  html+=start(9,'Bid / No-Bid Decision','The controlled executive recommendation and conditions for authorization.',total,id,prepared);
  html+='<div class="decision-banner"><div><div class="label">Recommended Decision</div><strong>'+esc(recommendation.replace('-',' '))+'</strong></div><span>Pursuit score '+score+' / 100</span></div>';
  html+='<div class="summary"><div class="eyebrow">Decision Rationale</div><div class="copy"><p>'+text(a.rationale,'The recommendation is preliminary and requires management validation.',1000)+'</p></div></div>';
  html+='<div class="panel"><h3>Conditions Precedent to Full Pursuit Authorization</h3>'+(arr(a.decision_conditions).length?arr(a.decision_conditions).slice(0,8).map(x=>'<div class="condition">'+text(x,'Validation condition',240)+'</div>').join(''):'<div class="condition">Complete the full solicitation, amendment, eligibility, and evidence review.</div>')+'</div>';
  html+='<div class="callout" style="margin-top:13px"><strong>Decision integrity</strong><span>This assessment is executive decision support—not a proposal, guarantee of eligibility, or prediction of award. The official solicitation and verified business records remain controlling.</span></div>'+footer()+'</section>';

  html+=start(10,'Executive Action Plan','Time-phased actions to convert a preliminary match into an informed management decision.',total,id,prepared);
  html+='<div class="three"><div class="action-col"><h3>Immediate · Today</h3><ol>'+list(actions.immediate,5)+'</ol></div><div class="action-col"><h3>Next 72 Hours</h3><ol>'+list(actions.next_72_hours,5)+'</ol></div><div class="action-col"><h3>First Week</h3><ol>'+list(actions.first_week,5)+'</ol></div></div>';
  html+='<div class="two" style="margin-top:13px"><div class="panel"><h3>Proposal Readiness Inputs</h3><ul>'+list(a.documents_needed,6)+'</ul></div><div class="panel"><h3>Commercial & Pricing Inputs</h3><ul>'+list(a.pricing_considerations,6)+'</ul></div></div>'+footer()+'</section>';

  html+=start(11,'Management Authorization & Source Notes','Decision accountability, evidence limitations, and the official record required for final action.',total,id,prepared);
  html+='<div class="two"><div class="panel"><h3>Management Authorization</h3><p>Decision: ☐ Pursue &nbsp; ☐ Conditional Pursuit &nbsp; ☐ Do Not Pursue</p><div class="signature-grid"><div class="signature">Authorized By / Title</div><div class="signature">Date</div><div class="signature">Capture / Proposal Lead</div><div class="signature">Conditions Accepted</div></div></div><div class="panel"><h3>Assessment Record</h3><p><strong>Assessment ID:</strong> '+esc(id)+'</p><p><strong>Business:</strong> '+esc(client)+'</p><p><strong>Opportunity:</strong> '+esc(title)+'</p><p><strong>Provider:</strong> '+esc(data.provider||'Configured AI service')+'</p><p><strong>Report Standard:</strong> '+esc(data.report_standard||'APROPOS-EOA-11P-STATE-LOCAL-v1')+'</p></div></div>';
  html+='<div class="panel" style="margin-top:13px"><h3>Source Notes</h3><ul class="sources">'+list([bid.url||bid.official_source_url?'Official opportunity source: '+(bid.url||bid.official_source_url):'Official opportunity URL was not supplied.'].concat(arr(a.source_notes)),8)+'</ul></div>';
  html+='<div class="panel" style="margin-top:13px"><h3>Limitations</h3><p class="limitations">This assessment uses the business information and opportunity metadata available during the current NAT-CORP visit. It may not include every solicitation attachment, amendment, question-and-answer posting, registration rule, license requirement, insurance term, bonding term, evaluation factor, or current business credential. No missing fact has been treated as verified. Management must validate the official procurement record before committing resources or submitting an offer.</p></div>'+footer()+'</section>';
  html+='</div>';
  loading.style.display='none';report.innerHTML=html;printBtn.style.display='inline-flex';trust.hidden=false;
}
if(!payload||!payload.bid){fail('No opportunity was supplied. Return to the bid board and select Analyze Fit again.')}else{fetch('/api/analyze-fit-state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw new Error(d.error||'The assessment service returned '+r.status+(d.diagnostic?'. '+d.diagnostic:''));return d}).then(build).catch(e=>fail(e.message))}
</script>
